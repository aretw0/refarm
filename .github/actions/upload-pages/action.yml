name: "Upload Pages Artifact"
description: "Secure wrapper for actions/upload-pages-artifact with pinned hash."

inputs:
  path:
    description: "Directory containing the static assets"
    required: true
    default: "dist"

runs:
  using: "composite"
  steps:
    - name: Upload artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: ${{ inputs.path }}
