name: "Upload Pages Artifact"
description: "Secure wrapper for actions/upload-pages-artifact with pinned hash."

inputs:
  path:
    description: "Directory containing the static assets"
    required: true
    default: "dist"

runs:
  using: "composite"
  steps:
    - name: Upload artifact
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
      with:
        path: ${{ inputs.path }}
