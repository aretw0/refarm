name: "Refarm Setup"
description: "Centralized setup: Node.js and npm ci."

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  rust-target:
    description: "Rust target to install (e.g. wasm32-wasip1)"
    required: false
    default: "wasm32-wasip1"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: |
        if [ -f package-lock.json ]; then
          echo "Found package-lock.json, attempting npm ci..."
          npm ci || (echo "npm ci failed, falling back to npm install..." && npm install)
        else
          echo "No package-lock.json found, running npm install..."
          npm install
        fi

    - name: Setup Rust toolchain
      if: ${{ inputs.rust-target != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-target }}

    - name: Cache cargo-component
      if: ${{ inputs.rust-target != '' }}
      id: cache-cargo-component
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cargo/bin/cargo-component
        key: ${{ runner.os }}-cargo-component-0.21.1

    - name: Install cargo-component
      if: ${{ inputs.rust-target != '' && steps.cache-cargo-component.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        if cargo component --version >/dev/null 2>&1; then
          echo "cargo-component already installed"
        else
          cargo install --locked cargo-component --version 0.21.1
        fi

    - name: Rust cache
      if: ${{ inputs.rust-target != '' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: |
          packages/heartwood -> target
          validations/wasm-plugin/hello-world -> target
          packages/tractor-native -> target
