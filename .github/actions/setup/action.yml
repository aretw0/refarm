name: "Refarm Setup"
description: "Centralized setup: Node.js and npm ci."

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  playwright-setup:
    description: "Whether to setup Playwright browsers"
    required: false
    default: "false"
  rust-target:
    description: "Rust targets install (e.g. wasm32-wasip1). Multiple targets can be separated by commas."
    required: false
    default: "wasm32-wasip1,x86_64-unknown-linux-gnu"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Cache Turbo
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ hashFiles('package-lock.json', 'turbo.json') }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f package-lock.json ]; then
          echo "::error::package-lock.json is required for deterministic CI."
          exit 1
        fi

        echo "Installing dependencies with npm ci (deterministic mode)..."
        npm ci

    - name: Cache Playwright browsers
      if: ${{ inputs.playwright-setup == 'true' }}
      id: cache-playwright
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('package-lock.json', 'validations/sqlite-benchmark/browser/playwright.config.ts', 'validations/wasm-plugin/host/playwright.config.ts') }}
        restore-keys: |
          ${{ runner.os }}-playwright-browsers-

    - name: Setup Playwright browsers
      if: ${{ inputs.playwright-setup == 'true' }}
      shell: bash
      run: |
        PW_CMD="npm exec --workspace validations/sqlite-benchmark/browser -- playwright"
        if $PW_CMD install --list | grep -Eq '/(chromium|firefox|webkit)-'; then
          echo "Playwright browsers already available, skipping installation..."
        else
          echo "Installing Playwright browsers..."
          $PW_CMD install --with-deps
        fi

    - name: Setup Rust toolchain
      if: ${{ inputs.rust-target != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-target }}

    - name: Cache cargo-component
      if: ${{ inputs.rust-target != '' }}
      id: cache-cargo-component
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cargo/bin/cargo-component
        key: ${{ runner.os }}-cargo-component-0.21.1

    - name: Install cargo-component
      if: ${{ inputs.rust-target != '' && steps.cache-cargo-component.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        if cargo component --version >/dev/null 2>&1; then
          echo "cargo-component already installed"
        else
          cargo install --locked cargo-component --version 0.21.1
        fi

    - name: Rust cache
      if: ${{ inputs.rust-target != '' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: |
          packages/heartwood -> target
          validations/wasm-plugin/hello-world -> target
          validations/simple-wasm-plugin -> target
          templates/rust-plugin -> target
          packages/tractor -> target
          packages/tractor/tests/fixtures/null-plugin -> target
