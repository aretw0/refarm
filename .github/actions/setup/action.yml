name: "Refarm Setup"
description: "Centralized setup: Node.js and npm ci."

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@1a71f999c1d1aa0c44304f5260178401be3e4811 # v6.3.0 (2026 stable)
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: |
        if [ -f package-lock.json ]; then
          echo "Found package-lock.json, attempting npm ci..."
          npm ci || (echo "npm ci failed, falling back to npm install..." && npm install)
        else
          echo "No package-lock.json found, running npm install..."
          npm install
        fi
