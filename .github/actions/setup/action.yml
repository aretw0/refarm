name: "Refarm Setup"
description: "Centralized setup: Node.js and pnpm install --frozen-lockfile."

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  playwright-setup:
    description: "Whether to setup Playwright browsers"
    required: false
    default: "false"
  rust-target:
    description: "Rust targets install (e.g. wasm32-wasip1). Multiple targets can be separated by commas."
    required: false
    default: "wasm32-wasip1,x86_64-unknown-linux-gnu"
  turbo-cache-api:
    description: "Turbo remote cache API URL (TURBO_API). When set, remote cache is used instead of local GHA cache."
    required: false
    default: ""
  turbo-cache-token:
    description: "Turbo remote cache Bearer token (TURBO_TOKEN)."
    required: false
    default: ""
  turbo-cache-team:
    description: "Turbo team slug for cache key namespacing (TURBO_TEAM)."
    required: false
    default: "refarm"
  is-pr:
    description: "Whether this run is triggered by a pull_request event. Scopes Turbo cache to prevent cache poisoning."
    required: false
    default: "false"
  pr-number:
    description: "Pull request number (used for scoped cache key when is-pr=true)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Validate PR cache inputs
      if: ${{ inputs.is-pr == 'true' && inputs.pr-number == '' }}
      shell: bash
      run: |
        echo "::error::is-pr=true requires pr-number to be set. Pass pr-number: \${{ github.event.pull_request.number }}"
        exit 1

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    # SECURITY: Turbo cache is scoped by context (PR vs push) to prevent cache poisoning.
    # PRs write to turbo-pr-* namespace; push builds write to turbo-push-* namespace.
    # These are disjoint: main/develop cannot restore a PR's poisoned Turbo cache.
    # See: docs/security/ci-cache-hardening.md
    - name: Cache Turbo — PR
      if: ${{ inputs.turbo-cache-api == '' && inputs.is-pr == 'true' }}
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-pr-${{ inputs.pr-number }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
        restore-keys: |
          ${{ runner.os }}-turbo-pr-${{ inputs.pr-number }}-

    - name: Cache Turbo — push
      if: ${{ inputs.turbo-cache-api == '' && inputs.is-pr != 'true' }}
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-push-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
        restore-keys: |
          ${{ runner.os }}-turbo-push-

    - name: Configure Turbo remote cache
      if: ${{ inputs.turbo-cache-api != '' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "TURBO_API=${{ inputs.turbo-cache-api }}" >> "$GITHUB_ENV"
        echo "TURBO_TOKEN=${{ inputs.turbo-cache-token }}" >> "$GITHUB_ENV"
        echo "TURBO_TEAM=${{ inputs.turbo-cache-team }}" >> "$GITHUB_ENV"
        echo "Remote Turbo cache configured (api=${{ inputs.turbo-cache-api }} team=${{ inputs.turbo-cache-team }})"

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f pnpm-lock.yaml ]; then
          echo "::error::pnpm-lock.yaml is required for deterministic CI."
          exit 1
        fi

        echo "Installing dependencies with pnpm install --frozen-lockfile (deterministic mode)..."
        pnpm install --frozen-lockfile

    - name: Configure CI cargo target directory
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${CARGO_TARGET_DIR:-}" ] && [ -n "${GITHUB_WORKSPACE:-}" ]; then
          echo "CARGO_TARGET_DIR=${GITHUB_WORKSPACE}/target" >> "$GITHUB_ENV"
          echo "Using CI cargo target directory: ${GITHUB_WORKSPACE}/target"
        fi

    - name: Cache Playwright browsers
      if: ${{ inputs.playwright-setup == 'true' }}
      id: cache-playwright
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('pnpm-lock.yaml', 'validations/sqlite-benchmark/browser/playwright.config.ts', 'validations/wasm-plugin/host/playwright.config.ts') }}
        restore-keys: |
          ${{ runner.os }}-playwright-browsers-

    - name: Setup Playwright browsers
      if: ${{ inputs.playwright-setup == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        PW_CMD="pnpm -C validations/sqlite-benchmark/browser exec playwright"

        echo "Installing Playwright system dependencies..."
        $PW_CMD install-deps chromium firefox webkit

        if $PW_CMD install --list | grep -Eq '/(chromium|firefox|webkit)-'; then
          echo "Playwright browsers already available, skipping browser installation..."
        else
          echo "Installing Playwright browsers..."
          $PW_CMD install chromium firefox webkit
        fi

    - name: Setup Rust toolchain
      if: ${{ inputs.rust-target != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-target }}

    - name: Cache cargo-component
      if: ${{ inputs.rust-target != '' }}
      id: cache-cargo-component
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cargo/bin/cargo-component
        key: ${{ runner.os }}-cargo-component-0.21.1

    - name: Install cargo-component
      if: ${{ inputs.rust-target != '' && steps.cache-cargo-component.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        if cargo component --version >/dev/null 2>&1; then
          echo "cargo-component already installed"
        else
          cargo install --locked cargo-component --version 0.21.1
        fi

    - name: Rust cache
      if: ${{ inputs.rust-target != '' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: |
          packages/heartwood -> target
          validations/wasm-plugin/hello-world -> target
          validations/simple-wasm-plugin -> target
          templates/rust-plugin -> target
          packages/tractor -> target
          packages/tractor/tests/fixtures/null-plugin -> target
