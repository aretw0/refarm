name: "Download Artifact Wrapper"
description: "Centralized wrapper for actions/download-artifact"

inputs:
  name:
    description: "Artifact name"
    required: true
  path:
    description: "Destination path"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Download artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4 (stable)
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
