name: "Download Artifact Wrapper"
description: "Centralized wrapper for actions/download-artifact"

inputs:
  name:
    description: "Artifact name"
    required: true
  path:
    description: "Destination path"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Download artifact
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372df29293a # v8.0.0 (2026 stable)
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
