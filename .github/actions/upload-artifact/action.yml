name: "Upload Artifact Wrapper"
description: "Centralized wrapper for actions/upload-artifact"

inputs:
  name:
    description: "Artifact name"
    required: true
  path:
    description: "File or directory path to upload"
    required: true
  retention-days:
    description: "Artifact retention in days"
    required: false
    default: "30"
  if-no-files-found:
    description: "Behavior when no files match path: warn, error, or ignore"
    required: false
    default: "warn"

runs:
  using: "composite"
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 (stable)
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
