name: "Upload Artifact Wrapper"
description: "Centralized wrapper for actions/upload-artifact"

inputs:
  name:
    description: "Artifact name"
    required: true
  path:
    description: "File or directory path to upload"
    required: true
  retention-days:
    description: "Artifact retention in days"
    required: false
    default: "30"

runs:
  using: "composite"
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@v7.0.0
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention-days }}
