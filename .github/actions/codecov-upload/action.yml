name: "Codecov Upload Wrapper"
description: "Centralized wrapper for codecov/codecov-action"

inputs:
  files:
    description: "Coverage file path(s)"
    required: true
  flags:
    description: "Codecov flags"
    required: false
    default: ""
  name:
    description: "Upload name"
    required: false
    default: ""
  token:
    description: "Codecov token, if required"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@0565863a3012c7fc5b7df8be23ca6e6c1e9206b1 # v5.5.2 (2026 stable)
      with:
        files: ${{ inputs.files }}
        flags: ${{ inputs.flags }}
        name: ${{ inputs.name }}
        token: ${{ inputs.token }}
