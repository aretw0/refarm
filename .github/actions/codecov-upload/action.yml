name: "Codecov Upload Wrapper"
description: "Centralized wrapper for codecov/codecov-action"

inputs:
  files:
    description: "Coverage file path(s)"
    required: true
  flags:
    description: "Codecov flags"
    required: false
    default: ""
  name:
    description: "Upload name"
    required: false
    default: ""
  token:
    description: "Codecov token, if required"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5 (stable)
      with:
        files: ${{ inputs.files }}
        flags: ${{ inputs.flags }}
        name: ${{ inputs.name }}
        token: ${{ inputs.token }}
