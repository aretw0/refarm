name: "GitHub Script Wrapper"
description: "Centralized wrapper for actions/github-script"

inputs:
  script:
    description: "JavaScript source executed by actions/github-script"
    required: true

runs:
  using: "composite"
  steps:
    - name: Run GitHub script
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: ${{ inputs.script }}
