# .github/workflow-templates/plugin-ci.yml
#
# Refarm Plugin CI/CD — "DevOps in Grand Style"
#
# This template standardises the test and build process for Refarm plugins.
# It delegates the WASM compilation pipeline to the reusable workflow at
# refarm-dev/refarm/.github/workflows/reusable-build-wasm-plugin.yml
#
# Replace MY_PLUGIN_NAME with your component name (lowercase-kebab).

name: Plugin CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Tests (Unit & Conformance)
        run: npm test

  build-wasm:
    needs: test
    uses: refarm-dev/refarm/.github/workflows/reusable-build-wasm-plugin.yml@main
    with:
      component-name: MY_PLUGIN_NAME
      workspace-path: .
      output-dir: pkg
      upload-artifact: true
