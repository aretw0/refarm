name: Reusable Dependency Update

on:
  workflow_call:
    inputs:
      report-file:
        description: File generated by dependency check
        required: false
        type: string
        default: deps-report.md
      check-command:
        description: Command that generates dependency report
        required: false
        type: string
        default: npm run deps:check
      no-updates-pattern:
        description: Pattern that indicates no updates are required
        required: false
        type: string
        default: Nenhuma dependência desatualizada
      update-command:
        description: Command(s) used to apply dependency updates
        required: false
        type: string
        default: |
          npm run deps:update
          npm install
      issue-title:
        description: Tracking issue title
        required: false
        type: string
        default: Automated Dependency Updates Report
      issue-search-query:
        description: Search query used to find open tracking issue
        required: false
        type: string
        default: in:title Automated Dependency Updates Report
      issue-labels:
        description: Comma-separated labels for tracking issue
        required: false
        type: string
        default: dependencies
      pr-commit-message:
        description: Commit message used by create pull request action
        required: false
        type: string
        default: "chore(deps): autoupdate dependencies across workspaces"
      pr-title:
        description: Pull request title
        required: false
        type: string
        default: "chore(deps): automated update for dependencies"
      pr-body-template:
        description: PR body template; use {{ISSUE_URL}} token when needed
        required: false
        type: string
        default: |
          ## 🔄 Atualização Automática de Dependências

          Este PR aplica automaticamente as **atualizações identificadas pelo novo script customizado `npm run deps:check`**.

          O relatório detalhado pode ser discutido na Issue: {{ISSUE_URL}}

          O PR está criado e mantido nesta branch única para testes e validação contínua ao longo do mês.
      pr-branch:
        description: Branch used by create pull request action
        required: false
        type: string
        default: bot/dependency-updates
      pr-labels:
        description: Comma-separated labels for pull request
        required: false
        type: string
        default: dependencies

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Check outdated dependencies
        id: check
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.check-command }}

          if grep -q "${{ inputs.no-updates-pattern }}" "${{ inputs.report-file }}"; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "✅ No updates needed."
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "📦 Updates discovered, preparing issue and PR."
          fi

      - name: Manage issue
        id: manage_issue
        if: steps.check.outputs.has_updates == 'true'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: ${{ inputs.issue-title }}
          body-file: ${{ inputs.report-file }}
          search-query: ${{ inputs.issue-search-query }}
          labels: ${{ inputs.issue-labels }}

      - name: Apply updates
        if: steps.manage_issue.outputs.proceed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.update-command }}

      - name: Render PR body
        id: pr_body
        if: steps.manage_issue.outputs.proceed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BODY_TEMPLATE="${{ inputs.pr-body-template }}"
          BODY_RENDERED="${BODY_TEMPLATE//\{\{ISSUE_URL\}\}/${{ steps.manage_issue.outputs.issue_url }}}"

          {
            echo 'body<<EOF'
            echo "$BODY_RENDERED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.manage_issue.outputs.proceed == 'true'
        uses: ./.github/actions/create-pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ inputs.pr-commit-message }}
          title: ${{ inputs.pr-title }}
          body: ${{ steps.pr_body.outputs.body }}
          branch: ${{ inputs.pr-branch }}
          delete-branch: true
          labels: ${{ inputs.pr-labels }}
