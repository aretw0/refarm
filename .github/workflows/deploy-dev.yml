# .github/workflows/deploy-dev.yml
# 
# Refarm.dev Homestead Deployment — "Residency in Grand Style"
#
# This workflow automates the deployment of the Dev Homestead app to GitHub Pages and beyound.
# It ensures the required security headers (COOP/COEP) are considered for the
# static hosting environment (GitHub Pages handles these via headers if configured).

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/dev/**'
      - 'packages/**'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Refarm.dev App
        # Compositional build via turbo, filtering for the app
        run: npx turbo build --filter=@refarm.dev/app

      - name: Upload artifact
        uses: ./.github/actions/upload-pages
        with:
          path: apps/dev/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: ./.github/actions/deploy-pages
