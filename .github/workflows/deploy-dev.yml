# .github/workflows/deploy-dev.yml
# 
# Refarm.dev Homestead Deployment — "Residency in Grand Style"
#
# This workflow automates the deployment of the Dev Homestead app to GitHub Pages and beyound.
# It ensures the required security headers (COOP/COEP) are considered for the
# static hosting environment (GitHub Pages handles these via headers if configured).

name: Deploy to Refarm.dev

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/dev/**'
      - 'packages/**'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Switch to Local Resolution (src)
        run: node scripts/reso.mjs src

      - name: Setup Refarm Environment
        run: node scripts/ci/setup-env.mjs

      - name: Restore Distribution Resolution (dist)
        run: node scripts/reso.mjs dist

      - name: Build Refarm.dev App
        # Compositional build via turbo, filtering for the app using the dynamic scope
        run: npx turbo build --filter="$REFARM_SCOPE_DEV/app"

      - name: Upload artifact
        uses: ./.github/actions/upload-pages
        with:
          path: apps/dev/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to GitHub Pages
        id: deployment
        uses: ./.github/actions/deploy-pages
