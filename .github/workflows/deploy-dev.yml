# .github/workflows/deploy-dev.yml
#
# Refarm.dev Site Deployment
#
# This workflow automates the deployment of the public Refarm site to GitHub Pages.
# It ensures the required security headers (COOP/COEP) are considered for the
# static hosting environment (GitHub Pages handles these via headers if configured).

name: Deploy to Refarm.dev

on:
  push:
    branches: [main, master]
    paths:
      - "apps/site/**"
      - "packages/**"
      - ".github/actions/deploy-pages/**"
      - ".github/actions/setup/**"
      - ".github/actions/upload-pages/**"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          cache-mode: "off"

      - name: Switch to Local Resolution (src)
        run: node scripts/reso.mjs src

      - name: Setup Refarm Environment
        run: node scripts/ci/setup-env.mjs

      - name: Build Refarm.dev Site
        env:
          ASTRO_SITE: ${{ vars.REFARM_ASTRO_SITE || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
          ASTRO_BASE: ${{ vars.REFARM_ASTRO_BASE || format('/{0}/', github.event.repository.name) }}
        run: pnpm --filter "$REFARM_SCOPE_DEV/site" run build

      - name: Verify Astro base-path links
        env:
          ASTRO_BASE: ${{ vars.REFARM_ASTRO_BASE || format('/{0}/', github.event.repository.name) }}
        run: node scripts/ci/check-astro-base-links.mjs apps/site/dist "$ASTRO_BASE"

      - name: Upload artifact
        uses: ./.github/actions/upload-pages
        with:
          path: apps/site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy to GitHub Pages
        id: deployment
        uses: ./.github/actions/deploy-pages
