name: Publish Crates

on:
  push:
    tags:
      - "refarm-tractor@*"
      - "refarm-hello-world-plugin@*"
  workflow_dispatch:

jobs:
  publish:
    if: vars.RELEASE_AUTOMATION == 'true' && (vars.RELEASE_OWNER == '' || github.repository_owner == vars.RELEASE_OWNER)
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          rust-target: "" # Default host target is enough for publish

      - name: Extract crate info from tag
        id: pkg
        run: |
          TAG="${{ github.ref_name }}"
          # Example: refarm-tractor@0.1.0 -> name=refarm-tractor, version=0.1.0
          NAME=$(echo "$TAG" | cut -d'@' -f1)
          VERSION=$(echo "$TAG" | cut -d'@' -f2)
          
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Map crate name to directory
          if [ "$NAME" == "refarm-tractor" ]; then
            echo "path=packages/tractor" >> $GITHUB_OUTPUT
          elif [ "$NAME" == "refarm-hello-world-plugin" ]; then
            echo "path=validations/wasm-plugin/hello-world" >> $GITHUB_OUTPUT
          else
            echo "::error::Unknown crate name: $NAME"
            exit 1
          fi

      - name: Verify crate version matches tag
        run: |
          # Simple grep to find version in Cargo.toml
          CRATE_VERSION=$(grep -m 1 '^version =' "${{ steps.pkg.outputs.path }}/Cargo.toml" | cut -d'"' -f2)
          TAG_VERSION="${{ steps.pkg.outputs.version }}"
          
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag version: $TAG_VERSION"
            echo "   Cargo.toml: $CRATE_VERSION"
            exit 1
          fi
          echo "✅ Version $CRATE_VERSION matches tag"

      - name: Dry-run publish
        run: cargo publish --dry-run
        working-directory: ${{ steps.pkg.outputs.path }}

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: ${{ steps.pkg.outputs.path }}
