name: Validate Diagrams

on:
  pull_request:
    paths:
      - "docs/**/*.mermaid"
      - "specs/diagrams/**/*.mermaid"
  push:
    branches:
      - main
    paths:
      - "docs/**/*.mermaid"
      - "specs/diagrams/**/*.mermaid"
  # Manually triggered or scheduled validation
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 3" # Every Wednesday at 14:00 UTC

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/reusable-validate-docs.yml
    with:
      validation-command: REFARM_DIAGRAM_SYNC_STRICT=0 npm run diagrams:check -- --ci
      validation-name: Diagrams
      create-issue-on-failure: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
      issue-title: "Mermaid diagram validation failed"
      issue-labels: "documentation,diagrams,validation"
