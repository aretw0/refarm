name: Validate Diagrams

on:
  pull_request:
    paths:
      - "docs/**/*.mermaid"
      - ".github/workflows/validate-diagrams.yml"
      - "scripts/check-diagrams.mjs"
  push:
    branches:
      - main
    paths:
      - "docs/**/*.mermaid"

permissions:
  contents: read

jobs:
  validate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Validate Diagrams
        run: npm run diagrams:check -- --ci
