name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  audit:
    uses: ./.github/workflows/reusable-security-audit.yml
    with:
      artifact-name: npm-audit-full-report
      issue-title: Automated Security Audit Report
      issue-search-query: in:title Automated Security Audit Report
      issue-labels: security
