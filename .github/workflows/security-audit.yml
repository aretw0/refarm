name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Security gate (high and critical)
        run: npm audit --audit-level=high

      - name: Generate full audit report
        id: audit_report
        if: always()
        uses: ./.github/actions/npm-audit-report
        with:
          json-output: audit-full.json
          markdown-output: audit-full.md

      - name: Security audit notice
        if: always()
        run: |
          echo "::notice::Security audit snapshot: total=${{ steps.audit_report.outputs.total }} moderate=${{ steps.audit_report.outputs.moderate }} high=${{ steps.audit_report.outputs.high }} critical=${{ steps.audit_report.outputs.critical }}"

      - name: Manage security issue
        id: manage_issue
        if: always() && steps.audit_report.outcome == 'success'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: "Automated Security Audit Report"
          body-file: audit-full.md
          search-query: "in:title Automated Security Audit Report"
          labels: "security"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@${{ steps.setup.outputs.upload-artifact-version }}
        with:
          name: npm-audit-full-report
          path: |
            audit-full.json
            audit-full.md
          retention-days: 30
