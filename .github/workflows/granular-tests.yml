name: Granular Matrix Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/**"
      - "packages/**"
      - "templates/**"
      - "validations/**"
      - "scripts/ci/github-matrix-builder.mjs"
      - "scripts/ci/matrix-runner.mjs"
      - "scripts/ci/setup-env.mjs"
      - "scripts/ci/content-signature.mjs"
      - ".github/actions/setup/**"
      - ".github/workflows/granular-tests.yml"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "tsconfig.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # JOB 1: Matrix Discovery (Detect changes and calculate package impact)
  #
  # Scope boundary:
  # - Test & Quality owns monorepo health: build/lint/types/tests/smokes.
  # - This workflow owns package compatibility across local/published edges.
  # -----------------------------------------------------------------
  matrix-setup:
    name: Matrix Discovery
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix-cache-hit.outputs.matrix || steps.build-matrix.outputs.matrix }}
      matrix_key: ${{ steps.signature.outputs.matrix_key }}
      cache_hit: ${{ steps.matrix-cache.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute matrix validation signature
        id: signature
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/refarm-matrix-signature-patterns.txt <<'EOF'
          apps
          packages
          templates
          validations
          scripts/ci/github-matrix-builder.mjs
          scripts/ci/matrix-runner.mjs
          scripts/ci/setup-env.mjs
          scripts/ci/content-signature.mjs
          .github/actions/setup
          .github/workflows/granular-tests.yml
          package.json
          package-lock.json
          turbo.json
          tsconfig.json
          .cargo/config.toml
          EOF

          node scripts/ci/content-signature.mjs \
            --name granular-matrix \
            --output matrix_key \
            --patterns-file /tmp/refarm-matrix-signature-patterns.txt

      - name: Restore matrix result cache
        id: matrix-cache
        if: steps.signature.outputs.matrix_key != ''
        uses: ./.github/actions/cache
        with:
          path: .artifacts/validation-cache/granular-matrix
          key: ${{ steps.signature.outputs.matrix_key }}

      - name: Matrix cache hit
        id: matrix-cache-hit
        if: steps.matrix-cache.outputs.cache-hit == 'true'
        run: |
          echo "::notice::Reusing previous successful Granular Matrix validation for unchanged inputs."
          echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup
        if: steps.matrix-cache.outputs.cache-hit != 'true'

      - name: Build Matrix DAG
        id: build-matrix
        if: steps.matrix-cache.outputs.cache-hit != 'true'
        run: node scripts/ci/github-matrix-builder.mjs

  # -----------------------------------------------------------------
  # JOB 2: Matrix Isolator Builder (published/local compatibility testing)
  # -----------------------------------------------------------------
  matrix-runner:
    name: ${{ matrix.name }}
    needs: [matrix-setup]
    runs-on: ubuntu-latest
    # If matrix is empty, this job is skipped automatically
    if: ${{ fromJson(needs.matrix-setup.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build WASM plugin for tests
        run: |
          cd validations/wasm-plugin/hello-world
          cargo component build --release

      # STRATEGY: FORWARD COMPAT (Isolating modified package to test against NPM deps)
      - name: Execute Forward Compatibility
        if: ${{ matrix.strategy == 'forward' }}
        run: node scripts/ci/matrix-runner.mjs --run-forward ${{ matrix.package }}

      # STRATEGY: BACKWARD COMPAT (Injecting modified package into published dependents)
      - name: Execute Backward Compatibility
        if: ${{ matrix.strategy == 'backward' }}
        run: node scripts/ci/matrix-runner.mjs --run-backward ${{ matrix.package }} ${{ matrix.consumer }}

  matrix-cache-finalize:
    name: Matrix Cache Finalize
    needs: [matrix-setup, matrix-runner]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.matrix-setup.outputs.matrix_key != '' && needs.matrix-setup.outputs.cache_hit != 'true' && (needs.matrix-runner.result == 'success' || needs.matrix-runner.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare matrix cache save
        id: matrix-cache-save
        uses: ./.github/actions/cache
        with:
          path: .artifacts/validation-cache/granular-matrix
          key: ${{ needs.matrix-setup.outputs.matrix_key }}

      - name: Record matrix cache marker
        if: steps.matrix-cache-save.outputs.cache-hit != 'true'
        run: |
          mkdir -p .artifacts/validation-cache/granular-matrix
          printf '%s\n' "${{ github.sha }}" > .artifacts/validation-cache/granular-matrix/last-successful-sha.txt
