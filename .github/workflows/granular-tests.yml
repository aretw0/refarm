name: Granular Matrix Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # -----------------------------------------------------------------
  # JOB 1: Standard Local Symbiosis (Turborepo Filter)
  # -----------------------------------------------------------------
  local-symbiosis:
    name: Local Symbiosis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Detect dependency-only changes
        id: change-kind
        run: |
          set -euo pipefail
          files=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$files"

          dep_only=true
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            if [[ ! "$f" =~ (^|/)package\.json$ ]] && \
               [[ ! "$f" =~ (^|/)package-lock\.json$ ]] && \
               [[ ! "$f" =~ ^final-report\.md$ ]] && \
               [[ ! "$f" =~ ^\.changeset/.*\.md$ ]] && \
               [[ ! "$f" =~ ^\.github/workflows/granular-tests\.yml$ ]] && \
               [[ ! "$f" =~ ^scripts/ci/github-matrix-builder\.mjs$ ]]; then
              dep_only=false
              break
            fi
          done <<< "$files"

          echo "dep_only=$dep_only" >> "$GITHUB_OUTPUT"
          echo "Dependency-only PR: $dep_only"

      - name: Setup Refarm Environment
        if: ${{ steps.change-kind.outputs.dep_only != 'true' }}
        run: node scripts/ci/setup-env.mjs

      - name: Build Shared Contracts & Configs
        if: ${{ steps.change-kind.outputs.dep_only != 'true' }}
        run: npx turbo run build --filter="$REFARM_SCOPE_DEV/storage-contract-v1" --filter="$REFARM_SCOPE_DEV/identity-contract-v1" --filter="$REFARM_SCOPE_DEV/tsconfig"


      - name: Build WASM plugin for tests
        if: ${{ steps.change-kind.outputs.dep_only != 'true' }}
        run: |
          cd validations/wasm-plugin/hello-world
          cargo component build --release

      - name: Turbo Test (Local Monorepo Boundaries)
        if: ${{ steps.change-kind.outputs.dep_only != 'true' }}
        run: npx turbo run test --filter=...[origin/main]

      - name: Skip Local Symbiosis for dependency-only PR
        if: ${{ steps.change-kind.outputs.dep_only == 'true' }}
        run: echo "Skipping Local Symbiosis for dependency-only changes; quality/security workflows still validate this PR."

  # -----------------------------------------------------------------
  # JOB 2: Matrix Discovery (Detect changes and calculate impact)
  # -----------------------------------------------------------------
  matrix-setup:
    name: Matrix Discovery
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build Matrix DAG
        id: build-matrix
        run: node scripts/ci/github-matrix-builder.mjs

  # -----------------------------------------------------------------
  # JOB 3: Matrix Isolator Builder (Parallel Regression testing)
  # -----------------------------------------------------------------
  matrix-runner:
    name: ${{ matrix.name }}
    needs: [matrix-setup]
    runs-on: ubuntu-latest
    # If matrix is empty, this job is skipped automatically
    if: ${{ fromJson(needs.matrix-setup.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build WASM plugin for tests
        run: |
          cd validations/wasm-plugin/hello-world
          cargo component build --release

      # STRATEGY: FORWARD COMPAT (Isolating modified package to test against NPM deps)
      - name: Execute Forward Compatibility
        if: ${{ matrix.strategy == 'forward' }}
        run: node scripts/ci/matrix-runner.mjs --run-forward ${{ matrix.package }}

      # STRATEGY: BACKWARD COMPAT (Injecting modified package into published dependents)
      - name: Execute Backward Compatibility
        if: ${{ matrix.strategy == 'backward' }}
        run: node scripts/ci/matrix-runner.mjs --run-backward ${{ matrix.package }} ${{ matrix.consumer }}
