name: Issue Triage Automation

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Triage Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_PAYLOAD: ${{ toJSON(github.event.issue) }}
          REPOSITORY: ${{ github.repository }}
        run: node scripts/ci/triage-issue.mjs
