name: Reusable Security Audit

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name of uploaded audit artifact
        required: false
        type: string
        default: npm-audit-full-report
      issue-title:
        description: Title used to create or update tracking issue (high/critical)
        required: false
        type: string
        default: "Security Audit: High/Critical Vulnerabilities"
      issue-title-moderate:
        description: Title used to create or update tracking issue (moderate)
        required: false
        type: string
        default: "Security Audit: Moderate Vulnerabilities (prod)"
      issue-search-query:
        description: GitHub search query to find existing high/critical tracking issue
        required: false
        type: string
        default: 'in:title "Security Audit: High/Critical Vulnerabilities"'
      issue-search-query-moderate:
        description: GitHub search query for moderate tracking issue
        required: false
        type: string
        default: 'in:title "Security Audit: Moderate Vulnerabilities"'
      issue-labels:
        description: Comma-separated labels applied to issues
        required: false
        type: string
        default: security

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      # ── Tier 1: blocking gate — high/critical in prod deps ──────────────
      - name: Security gate (high/critical, prod deps only)
        id: audit_gate
        run: pnpm audit --audit-level=high --omit=dev

      # ── Tier 2: non-blocking gate — moderate in prod deps ───────────────
      - name: Security gate (moderate, prod deps only — non-blocking)
        id: audit_gate_moderate
        if: always()
        run: pnpm audit --audit-level=moderate --omit=dev
        continue-on-error: true

      # ── Generate rich report (prod + all) ───────────────────────────────
      - name: Generate full audit report
        id: audit_report
        if: always()
        uses: ./.github/actions/npm-audit-report
        with:
          json-output: audit-full.json
          markdown-output: audit-full.md

      # ── Annotate the run ─────────────────────────────────────────────────
      - name: Security audit summary notice
        if: always()
        run: |
          PROD_CRIT="${{ steps.audit_report.outputs.prod-critical }}"
          PROD_HIGH="${{ steps.audit_report.outputs.prod-high }}"
          PROD_MOD="${{ steps.audit_report.outputs.prod-moderate }}"
          ALL_TOTAL="${{ steps.audit_report.outputs.total }}"
          echo "::notice::Security audit — prod: critical=${PROD_CRIT} high=${PROD_HIGH} moderate=${PROD_MOD} | all: total=${ALL_TOTAL}"

      # ── Issue management: high/critical ──────────────────────────────────
      - name: Open/update issue for high/critical vulnerabilities
        id: manage_issue_high
        if: always() && steps.audit_report.outcome == 'success' && steps.audit_gate.outcome == 'failure'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: ${{ inputs.issue-title }}
          body-file: audit-full.md
          search-query: ${{ inputs.issue-search-query }}
          labels: ${{ inputs.issue-labels }},high-severity

      - name: Close high/critical issue when gate passes
        if: always() && steps.audit_report.outcome == 'success' && steps.audit_gate.outcome != 'failure'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          operation: close
          title: ${{ inputs.issue-title }}
          search-query: ${{ inputs.issue-search-query }}

      # ── Issue management: moderate (prod only) ───────────────────────────
      - name: Open/update issue for moderate prod vulnerabilities
        id: manage_issue_moderate
        if: >-
          always() &&
          steps.audit_report.outcome == 'success' &&
          steps.audit_gate.outcome != 'failure' &&
          steps.audit_gate_moderate.outcome == 'failure'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: ${{ inputs.issue-title-moderate }}
          body-file: audit-full.md
          search-query: ${{ inputs.issue-search-query-moderate }}
          labels: ${{ inputs.issue-labels }},moderate-severity

      - name: Close moderate issue when no prod moderate vulns remain
        if: >-
          always() &&
          steps.audit_report.outcome == 'success' &&
          steps.audit_gate_moderate.outcome != 'failure'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          operation: close
          title: ${{ inputs.issue-title-moderate }}
          search-query: ${{ inputs.issue-search-query-moderate }}

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload audit artifacts
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            audit-full.json
            audit-full-prod.json
            audit-full.md
          retention-days: 30
