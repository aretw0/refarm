name: Release (Changesets)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # Safety gate: publish automation must be explicitly enabled.
    # Optional owner lock via RELEASE_OWNER.
    if: vars.RELEASE_AUTOMATION == 'true' && (vars.RELEASE_OWNER == '' || github.repository_owner == vars.RELEASE_OWNER)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Setup Refarm Environment
        run: node scripts/ci/setup-env.mjs

      - name: Validate quality gates
        run: |
          npm run lint
          npm run type-check
          npm run test:capabilities

      - name: Validate browser runtime descriptor provenance gate
        run: npm --prefix packages/tractor-ts run runtime-module:ci

      - name: Export runtime descriptor bundle (versioned)
        if: always()
        run: node scripts/ci/export-runtime-descriptor-bundle.mjs --out-dir .artifacts/runtime-descriptors --version "${{ github.sha }}"

      - name: Upload runtime descriptor bundle artifact
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          name: runtime-descriptor-bundle-${{ github.sha }}
          path: .artifacts/runtime-descriptors/**
          retention-days: "30"
          if-no-files-found: warn

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: changeset version
          publish: changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish runtime descriptor bundle to release assets
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/ci/publish-runtime-descriptor-release-assets.mjs --bundle-dir .artifacts/runtime-descriptors --sha "${{ github.sha }}"

      - name: Publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages: ${{ steps.changesets.outputs.publishedPackages }}"
