name: Release (Changesets)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # Safety gate: publish automation must be explicitly enabled.
    # Optional owner lock via RELEASE_OWNER.
    if: vars.RELEASE_AUTOMATION == 'true' && (vars.RELEASE_OWNER == '' || github.repository_owner == vars.RELEASE_OWNER)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Setup Refarm Environment
        run: node scripts/ci/setup-env.mjs

      - name: Validate quality gates
        run: |
          npm run lint
          npm run type-check
          npm run test:capabilities

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: changeset version
          publish: changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages: ${{ steps.changesets.outputs.publishedPackages }}"
