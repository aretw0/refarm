name: Dependency Updates

on:
  schedule:
    - cron: "0 9 * * 1" # Todas as segundas às 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Check Outdated Dependencies
        id: check
        run: |
          npm run deps:check
          if grep -q "Nenhuma dependência desatualizada" deps-report.md; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ No updates needed."
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "📦 Updates discovered, preparing issue and PR."
          fi

      - name: Manage Issue
        id: manage_issue
        if: steps.check.outputs.has_updates == 'true'
        uses: ./.github/actions/manage-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: "Automated Dependency Updates Report"
          body-file: deps-report.md
          search-query: "in:title Automated Dependency Updates Report"
          labels: "dependencies"

      - name: Update Dependencies
        if: steps.manage_issue.outputs.proceed == 'true'
        run: |
          npm run deps:update
          npm install

      - name: Create Pull Request
        if: steps.manage_issue.outputs.proceed == 'true'
        uses: ./.github/actions/create-pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-pr-version: ${{ steps.setup.outputs.create-pr-version }}
          commit-message: "chore(deps): autoupdate dependencies across workspaces"
          title: "chore(deps): automated update for dependencies"
          body: |
            ## 🔄 Atualização Automática de Dependências

            Este PR aplica automaticamente as **atualizações identificadas pelo novo script customizado `npm run deps:check`**.

            O relatório detalhado pode ser discutido na Issue: ${{ steps.manage_issue.outputs.issue_url }}

            O PR está criado e mantido nesta branch única para testes e validação contínua ao longo do mês.
          branch: "bot/dependency-updates"
          delete-branch: true
          labels: "dependencies"
