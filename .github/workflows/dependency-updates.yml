name: Dependency Updates

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-update:
    uses: ./.github/workflows/reusable-dependency-update.yml
    with:
      report-file: deps-report.md
      check-command: pnpm run deps:check
      no-updates-pattern: Nenhuma dependência desatualizada
      update-command: |
        pnpm run deps:update
        pnpm install
      issue-title: Automated Dependency Updates Report
      issue-search-query: in:title Automated Dependency Updates Report
      issue-labels: dependencies
      pr-commit-message: "chore(deps): autoupdate dependencies across workspaces"
      pr-title: "chore(deps): automated update for dependencies"
      pr-body-template: |
        ## 🔄 Atualização Automática de Dependências

        Este PR consolida atualizações de dependências identificadas pelo fluxo automatizado de manutenção.

        O relatório detalhado pode ser discutido na Issue: {{ISSUE_URL}}

        O PR está criado e mantido nesta branch única para testes e validação contínua ao longo do mês.
      pr-branch: bot/dependency-updates
      pr-labels: dependencies
