name: Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: "0"

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build storage contract declarations
        run: npm --prefix packages/storage-contract-v1 run build

      - name: Storage capability conformance
        run: npm --prefix packages/storage-sqlite run test:conformance

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM plugin for tests
        run: |
          cd validations/simple-wasm-plugin
          cargo build --target wasm32-unknown-unknown --release

      - name: Unit tests
        if: "!contains(github.event.pull_request.labels.*.name, 'phase:sdd') && !contains(github.event.pull_request.labels.*.name, 'phase:bdd')"
        run: npm run test:unit -- --coverage

      - name: Integration tests
        if: "!contains(github.event.pull_request.labels.*.name, 'phase:sdd') && !contains(github.event.pull_request.labels.*.name, 'phase:bdd')"
        run: npm run test:integration

      - name: Benchmark Quality Gate (Tractor)
        run: |
          cd packages/tractor
          npm run bench:check

      - name: Upload coverage
        if: always()
        uses: ./.github/actions/codecov-upload
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-refarm

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: ./.github/actions/upload-artifact
        with:
          name: workspace-build
          path: |
            apps/**/dist
            packages/**/dist
          retention-days: 7
          if-no-files-found: warn

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Check E2E script status
        id: e2e_check
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT=$(node -p "(require('./package.json').scripts || {})['test:e2e'] || ''")
          if echo "$SCRIPT" | grep -qi "No E2E tests configured yet"; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E job skipped because test:e2e is still a placeholder."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Playwright version
        id: playwright_version
        if: steps.e2e_check.outputs.enabled == 'true'
        run: |
          PW_VERSION=$(node -p "require('./validations/wasm-plugin/host/package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=${PW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright_cache
        if: steps.e2e_check.outputs.enabled == 'true'
        uses: ./.github/actions/cache-playwright
        with:
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}-chromium-firefox-webkit
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}-
            ${{ runner.os }}-playwright-

      - name: Install E2E host dependencies
        if: steps.e2e_check.outputs.enabled == 'true'
        run: npm --prefix validations/wasm-plugin/host ci

      - name: Setup Rust toolchain for WASM Component
        if: steps.e2e_check.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install cargo-component
        if: steps.e2e_check.outputs.enabled == 'true'
        run: |
          if cargo component --version >/dev/null 2>&1; then
            echo "cargo-component already installed"
          else
            cargo install --locked cargo-component --version 0.21.1
          fi

      - name: Verify cargo-component
        if: steps.e2e_check.outputs.enabled == 'true'
        run: |
          if ! cargo component --version; then
            echo "::error::cargo-component is not available after installation"
            echo "::error::Run 'cargo install --locked cargo-component --version 0.21.1'"
            exit 1
          fi

      - name: Cache WASM plugin build
        id: wasm_cache
        if: steps.e2e_check.outputs.enabled == 'true'
        uses: ./.github/actions/cache
        with:
          path: |
            validations/wasm-plugin/hello-world/target
            validations/wasm-plugin/host/public/hello-world-plugin.wasm
            validations/wasm-plugin/host/src/generated
          key: ${{ runner.os }}-wasm-plugin-${{ hashFiles('validations/wasm-plugin/hello-world/Cargo.toml', 'validations/wasm-plugin/hello-world/Cargo.lock', 'validations/wasm-plugin/hello-world/src/**', 'validations/wasm-plugin/hello-world/wit/**', 'validations/wasm-plugin/host/package.json', 'validations/wasm-plugin/host/src/kernel-bridge.js') }}
          restore-keys: |
            ${{ runner.os }}-wasm-plugin-

      - name: Build hello-world WASM plugin
        if: steps.e2e_check.outputs.enabled == 'true' && steps.wasm_cache.outputs.cache-hit != 'true'
        run: |
          cd validations/wasm-plugin/hello-world
          cargo component build --release

      - name: Copy WASM plugin to host
        if: steps.e2e_check.outputs.enabled == 'true' && steps.wasm_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p validations/wasm-plugin/host/public
          cp validations/wasm-plugin/hello-world/target/wasm32-wasip1/release/hello_world_plugin.wasm validations/wasm-plugin/host/public/hello-world-plugin.wasm

      - name: Transpile WASM to JavaScript
        if: steps.e2e_check.outputs.enabled == 'true'
        run: |
          if [ ! -f validations/wasm-plugin/host/src/generated/hello-world.js ]; then
            npm --prefix validations/wasm-plugin/host run build:wasm
          else
            echo "Transpiled artifacts restored from cache"
          fi

      - name: Install Playwright browsers (from cache or fresh)
        if: steps.e2e_check.outputs.enabled == 'true'
        run: npm --prefix validations/wasm-plugin/host exec playwright install --with-deps

      - name: Download build artifacts
        if: steps.e2e_check.outputs.enabled == 'true'
        uses: ./.github/actions/download-artifact
        with:
          name: workspace-build
          path: .

      - name: Run E2E tests
        if: "steps.e2e_check.outputs.enabled == 'true' && !contains(github.event.pull_request.labels.*.name, 'phase:sdd') && !contains(github.event.pull_request.labels.*.name, 'phase:bdd')"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always() && steps.e2e_check.outputs.enabled == 'true'
        uses: ./.github/actions/upload-artifact
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

  audit-moderate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Audit moderate report (non-blocking)
        id: audit_report
        uses: ./.github/actions/npm-audit-report
        with:
          json-output: audit-moderate.json
          markdown-output: audit-moderate.md

      - name: Audit moderate notice
        if: steps.audit_report.outputs.total != '0'
        run: |
          echo "::warning::Security audit report: total=${{ steps.audit_report.outputs.total }} moderate=${{ steps.audit_report.outputs.moderate }} high=${{ steps.audit_report.outputs.high }} critical=${{ steps.audit_report.outputs.critical }}"

      - name: Audit moderate clean notice
        if: steps.audit_report.outputs.total == '0'
        run: |
          echo "::notice::Security audit report: no vulnerabilities found"

      - name: Upload audit report artifact
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          name: npm-audit-moderate-report
          path: |
            audit-moderate.json
            audit-moderate.md
          retention-days: 30

  summary:
    if: always()
    needs: [quality, build, e2e, audit-moderate]
    runs-on: ubuntu-latest

    steps:
      - name: Check all checks
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "::error::Quality checks failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::Build failed"
            exit 1
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::E2E tests failed"
            exit 1
          fi
          echo "::notice::All checks passed!"
