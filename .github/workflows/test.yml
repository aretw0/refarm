name: Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          fetch-depth: "0"

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Integration tests
        run: npm run test:integration

      - name: Upload coverage
        if: always()
        uses: ./.github/actions/codecov-upload
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-refarm

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  audit-moderate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Audit moderate report (non-blocking)
        id: audit_report
        uses: ./.github/actions/npm-audit-report
        with:
          json-output: audit-moderate.json
          markdown-output: audit-moderate.md

      - name: Audit moderate notice
        if: steps.audit_report.outputs.total != '0'
        run: |
          echo "::warning::Security audit report: total=${{ steps.audit_report.outputs.total }} moderate=${{ steps.audit_report.outputs.moderate }} high=${{ steps.audit_report.outputs.high }} critical=${{ steps.audit_report.outputs.critical }}"

      - name: Audit moderate clean notice
        if: steps.audit_report.outputs.total == '0'
        run: |
          echo "::notice::Security audit report: no vulnerabilities found"

      - name: Upload audit report artifact
        if: always()
        uses: ./.github/actions/upload-artifact
        with:
          name: npm-audit-moderate-report
          path: |
            audit-moderate.json
            audit-moderate.md
          retention-days: 30

  summary:
    if: always()
    needs: [quality, build, e2e, audit-moderate]
    runs-on: ubuntu-latest

    steps:
      - name: Check all checks
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "::error::Quality checks failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::Build failed"
            exit 1
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::E2E tests failed"
            exit 1
          fi
          echo "::notice::All checks passed!"
