name: Sync develop ← main

# Triggered every time main receives a push (PR merged, version bump, hotfix).
# Keeps develop aligned with the released main baseline so the next work lane
# starts from the promoted tree.
#
# Supported cases:
# - develop already equals main: no-op.
# - develop is behind main: fast-forward develop to main.
# - develop has the same tree as main but different history (typical squash release):
#   reset develop to main with --force-with-lease.
# - develop and main differ by content: stop and open a maintenance issue.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Align develop to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Align develop to main
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main develop --prune

          main_ref="origin/main"
          develop_ref="origin/develop"
          main_sha="$(git rev-parse "$main_ref")"
          develop_sha="$(git rev-parse "$develop_ref")"
          main_tree="$(git rev-parse "$main_ref^{tree}")"
          develop_tree="$(git rev-parse "$develop_ref^{tree}")"

          echo "main_sha=$main_sha"
          echo "develop_sha=$develop_sha"
          echo "main_tree=$main_tree"
          echo "develop_tree=$develop_tree"

          if [ "$main_sha" = "$develop_sha" ]; then
            echo "status=already-synced" >> "$GITHUB_OUTPUT"
            echo "✅ develop already points at main ($main_sha)."
            exit 0
          fi

          if git merge-base --is-ancestor "$develop_ref" "$main_ref"; then
            git checkout -B develop "$develop_ref"
            git merge --ff-only "$main_ref"
            git push origin develop
            echo "status=fast-forwarded" >> "$GITHUB_OUTPUT"
            echo "✅ develop fast-forwarded to main ($main_sha)."
            exit 0
          fi

          if [ "$main_tree" = "$develop_tree" ]; then
            git checkout -B develop "$main_ref"
            git push --force-with-lease origin develop
            echo "status=tree-equivalent-reset" >> "$GITHUB_OUTPUT"
            echo "✅ develop reset to main because both branches have the same tree ($main_tree)."
            exit 0
          fi

          echo "status=content-diverged" >> "$GITHUB_OUTPUT"
          echo "::error::develop and main diverged by content; manual intervention required."
          exit 0

      - name: Open issue on content divergence
        if: steps.sync.outputs.status == 'content-diverged'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat >/tmp/sync-develop-conflict.md <<'EOF'
          ## Sync automático encontrou divergência real de conteúdo

          `develop` e `main` não puderam ser alinhados automaticamente após o push em `main` `${{ github.sha }}`.

          O workflow só alinha automaticamente quando:

          - `develop` já aponta para `main`;
          - `develop` é ancestral de `main` e pode receber fast-forward;
          - `develop` e `main` têm a mesma árvore, mesmo com histórico diferente (caso típico de squash release).

          Como as árvores diferem, é necessário revisar manualmente.

          ### Fix manual sugerido

          ```bash
          git fetch origin
          git checkout develop
          git diff --stat origin/main..origin/develop
          git log --oneline --left-right origin/main...origin/develop
          ```

          Depois escolha conscientemente entre merge/rebase/reset, conforme a intenção da divergência.

          > Feche este issue após o sync manual.
          EOF

          gh issue create \
            --title "⚠️ develop divergiu de main — sync manual necessário" \
            --body-file /tmp/sync-develop-conflict.md \
            --repo "${{ github.repository }}"

          exit 1
