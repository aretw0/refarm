name: First Publish Vault Seed Ready

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run publish dry-runs only"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      confirm:
        description: "Required when dry_run=false: publish-vault-seed-ready-0.1.0"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  first-publish:
    if: vars.RELEASE_AUTOMATION == 'true' && (vars.RELEASE_OWNER == '' || github.repository_owner == vars.RELEASE_OWNER)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          cache-mode: "off"

      - name: Setup Refarm Environment
        run: node scripts/ci/setup-env.mjs

      - name: Release policy plan
        run: pnpm --silent run release:vault-seed:plan -- --json

      - name: Publish dry-run gate
        run: pnpm --silent run release:vault-seed:check

      - name: First-publish dry-run
        if: inputs.dry_run == 'true'
        run: pnpm --silent run release:vault-seed:first-publish -- --plan --json

      - name: Validate publish confirmation
        if: inputs.dry_run == 'false'
        env:
          REFARM_FIRST_PUBLISH_CONFIRM: ${{ inputs.confirm }}
        run: test "$REFARM_FIRST_PUBLISH_CONFIRM" = "publish-vault-seed-ready-0.1.0"

      - name: Configure npm authentication
        if: inputs.dry_run == 'false'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish 0.1.0 packages
        if: inputs.dry_run == 'false'
        env:
          REFARM_FIRST_PUBLISH_CONFIRM: ${{ inputs.confirm }}
        run: pnpm --silent run release:vault-seed:first-publish -- --publish --confirm "$REFARM_FIRST_PUBLISH_CONFIRM"
