name: Validate MDT Docs

on:
  pull_request:
    paths:
      - "packages/pi-agent/.templates/**"
      - "packages/pi-agent/README.md"
      - "packages/pi-agent/mdt.toml"
      - ".github/workflows/validate-mdt.yml"
  push:
    branches:
      - main
    paths:
      - "packages/pi-agent/.templates/**"
      - "packages/pi-agent/README.md"
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 3" # Every Wednesday at 14:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          rust-target: "x86_64-unknown-linux-gnu"

      - name: Cache mdt_cli
        id: cache-mdt
        uses: ./.github/actions/cache
        with:
          path: ~/.cargo/bin/mdt
          key: ${{ runner.os }}-mdt-cli-0.7.0

      - name: Install mdt_cli
        if: steps.cache-mdt.outputs.cache-hit != 'true'
        run: cargo install mdt_cli --locked

      - name: Check MDT sync
        id: validation
        run: cd packages/pi-agent && mdt check
        continue-on-error: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Create or update issue on failure
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/manage-issue
        with:
          title: "MDT documentation drift detected in pi-agent"
          labels: "documentation,mdt,validation"
          body: |
            # MDT Documentation Drift Detected

            The `mdt check` in `packages/pi-agent` found that template blocks are out of sync with target files.

            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **Branch:** ${{ github.ref_name }}

            ## Fix

            Run `mdt update` in `packages/pi-agent/` to resync, then commit:

            ```bash
            cd packages/pi-agent && mdt update
            git add README.md && git commit -m "docs: sync mdt template blocks"
            ```
          state: ${{ steps.validation.outcome == 'success' && 'closed' || 'open' }}
          token: ${{ secrets.GITHUB_TOKEN }}
