name: 🚨 Escape Hatch (Infrastructure Migration)

on:
  workflow_dispatch:
    inputs:
      backup_repo:
        description: 'Target Backup Repository URL'
        required: false
      dry_run:
        description: 'Dry Run'
        type: boolean
        default: true

jobs:
  migrate:
    name: Radical Portability Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        id: setup
        uses: ./.github/actions/setup

      - name: Install Dependencies
        run: npm ci

      - name: Setup Environment
        run: node scripts/ci/setup-env.mjs

      - name: Sync Infrastructure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          # Override backup repo if provided manually
          REFARM_SCOPE_BACKUP_REPO: ${{ github.event.inputs.backup_repo }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          node scripts/ci/sync-infra.mjs $DRY_RUN_FLAG
