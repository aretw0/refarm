[package]
name = "dispatch-surface"
version = "0.1.0"
edition = "2021"
description = "Core dispatch transport primitives shared by control-plane surfaces."
license = "AGPL-3.0-only"

[lib]
crate-type = ["cdylib"]

[package.metadata.component]
package = "refarm:dispatch-surface"

[package.metadata.component.target]
path = "wit"
world = "dispatch-surface"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
percent-encoding = "2"
chrono = { version = "0.4", default-features = false, features = [
  "clock",
  "serde",
] }
wit-bindgen = "0.41.0"
wit-bindgen-rt = "0.41.0"

[dev-dependencies]
