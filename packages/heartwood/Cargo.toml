[package]
name = "refarm-heartwood"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
ed25519-dalek = "2.2"
rand_core = { version = "0.6", features = ["getrandom"] }
wit-bindgen = "0.41.0"
wit-bindgen-rt = "0.41.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[package.metadata.component]
package = "refarm:heartwood"

[package.metadata.component.target]
path = "wit"
world = "core"
