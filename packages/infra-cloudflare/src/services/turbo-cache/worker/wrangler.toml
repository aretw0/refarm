name = "refarm-turbo-cache"
main = "index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# AUTH_TOKEN is a secret — never commit it.
# Set it with:  wrangler secret put AUTH_TOKEN
# Generate one: openssl rand -hex 32

[[r2_buckets]]
binding = "TURBO_CACHE"
bucket_name = "refarm-turbo-cache"
# Preview bucket for local wrangler dev:
# preview_bucket_name = "refarm-turbo-cache-preview"

# Retention policy — controls how long artifacts live in R2.
# R2 has no native object expiration; the scheduled Cron Trigger below enforces these limits.
# Override in the Cloudflare dashboard or via:
#   wrangler deploy --var ARTIFACT_TTL_SECONDS:7776000 --var MAX_ARTIFACT_BYTES:524288000
[vars]
# 50 MB per artifact (free tier: 10 GB R2 total). Raise to 524288000 (500 MB) for paid accounts.
MAX_ARTIFACT_BYTES = "52428800"
# 30-day TTL. This value is read by both the fetch handler (stale header) AND the scheduled
# cleanup (actual deletion). Set to 0 to retain forever and disable cleanup.
# Raise to 7776000 (90 days) for paid accounts with larger storage budgets.
ARTIFACT_TTL_SECONDS = "2592000"
# Set to "true" to log what would be deleted without deleting. Useful for testing the policy.
CLEANUP_DRY_RUN = "false"

# Scheduled cleanup — runs daily at 03:00 UTC.
# Deletes all R2 objects whose uploaded-at metadata exceeds ARTIFACT_TTL_SECONDS.
# Without this, stale artifacts accumulate until the free tier (10 GB) is exhausted.
# Disable by removing this block; then trigger cleanup manually via:
#   POST /v8/artifacts/cleanup          (real deletion)
#   POST /v8/artifacts/cleanup?dry_run=true  (preview)
[[triggers.crons]]
crons = ["0 3 * * *"]
