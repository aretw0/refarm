[package]
name = "refarm-tractor"
version = "0.1.0"
edition = "2021"
description = "Sovereign WASM plugin host — native Rust implementation of the Refarm Tractor"
license = "AGPL-3.0-only"
repository = "https://github.com/refarm-dev/refarm"
homepage = "https://refarm.dev"
keywords = ["wasm", "plugin-host", "sovereign", "crdt"]
categories = ["wasm", "database"]

# ─── Binary (daemon) ──────────────────────────────────────────────────────────
[[bin]]
name = "tractor"
path = "src/main.rs"

# ─── Library (embeddable) ─────────────────────────────────────────────────────
[lib]
name = "tractor"
path = "src/lib.rs"

# ─── Dependencies ─────────────────────────────────────────────────────────────
[dependencies]

# Plugin host — WASM Component Model via wasmtime
wasmtime           = { version = "26", features = ["component-model"] }
wasmtime-wasi      = { version = "26" }
wasmtime-wasi-http = { version = "26" }

# Storage — SQLite, same schema as packages/storage-sqlite
rusqlite = { version = "0.32", features = ["bundled"] }

# CRDT sync — binary-compatible with loro-crdt JS (loro-crdt@1.10.7)
loro = "~1.10"

# Async runtime + WebSocket daemon
tokio             = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util      = "0.3"

# Crypto — ed25519 native (same algo as @noble/ed25519 / heartwood.wasm)
# SecurityMode config makes signing opt-out — always available, never forced
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core     = { version = "0.6", features = ["getrandom"] }
sha2          = "0.10"   # SHA-256 for wasm_hash

# Serialization
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# Observability
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# Diff/patch — used by agent-fs `edit` tool
diffy = "0.3"

# Atomic file write — used by agent-fs write/edit (tmp → rename)
tempfile = "3"

# Utilities
anyhow    = "1"
thiserror = "1"
uuid      = { version = "1", features = ["v4"] }

# CLI argument parsing (daemon)
clap = { version = "4", features = ["derive"] }
hex  = "0.4"

# ─── Dev dependencies ─────────────────────────────────────────────────────────
[dev-dependencies]

# ─── Build profiles ───────────────────────────────────────────────────────────
[profile.dev]
# Reduz full DWARF (2) para line-tables-only (1).
# Corta ~40% do uso de RAM do rustc na fase de codegen para wasmtime.
# Não afeta comportamento em testes — só símbolos de debug.
debug = 1
# Serializa o codegen dentro de cada crate — troca velocidade por RAM.
# Crítico no devcontainer (4 GB hard cap): cranelift usa ~1.5 GB/codegen-unit.
codegen-units = 1
