[package]
name = "agent-tools"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.36"
diffy = "0.3"

[profile.release]
opt-level = "z"
lto = true
strip = true

[package.metadata.component]
package = "refarm:agent-tools"

[package.metadata.component.target]
path = "wit"
world = "agent-tools-provider"
