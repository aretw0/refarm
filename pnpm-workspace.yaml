catalog:
  # build tooling
  typescript: "^6.0.3"
  # wasm runtime
  "@bytecodealliance/jco": "^1.18.0"
  # crypto / identity primitives
  "@noble/ed25519": "^3.1.0"
  nostr-tools: "^2.23.3"
  # sync / storage
  isomorphic-git: "^1.37.5"
  # websocket
  ws: "^8.21.0"
  "@types/ws": "^8.18.1"
  # node types
  "@types/node": "^25.6.0"

shamefullyHoist: false
strictPeerDependencies: false
linkWorkspacePackages: true

packages:
  - "packages/*"
  - "apps/*"
  - "validations/*"
  - "validations/*/host"
  - "validations/*/browser"
  - "validations/*/hello-world"
  - "templates/*"
allowBuilds:
  "@loro-crdt/base": true
  "@playwright/test": true
  better-sqlite3: true
  esbuild: true
  playwright: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
  workerd: true
overrides:
  "@babel/core": 7.29.6
  "@zenuml/core": 3.50.1
  dompurify: 3.4.11
  esbuild: 0.28.1
  js-yaml: 4.2.0
  undici: 7.28.0
  ws: 8.21.0
  yaml: 2.9.0
