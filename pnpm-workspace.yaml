catalog:
  # build tooling
  typescript: "^6.0.3"
  # wasm runtime
  "@bytecodealliance/jco": "^1.18.0"
  # crypto / identity primitives
  "@noble/ed25519": "^3.1.0"
  nostr-tools: "^2.23.3"
  # sync / storage
  isomorphic-git: "^1.37.5"
  # websocket
  ws: "^8.20.0"
  "@types/ws": "^8.18.1"
  # node types
  "@types/node": "^25.6.0"

packages:
  - "packages/*"
  - "apps/*"
  - "validations/*"
  - "validations/*/host"
  - "validations/*/browser"
  - "validations/*/hello-world"
  - "templates/*"
allowBuilds:
  esbuild: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
  workerd: true
overrides:
  esbuild: 0.28.1
  ws: 8.20.1
auditConfig:
  ignoreGhsas:
    - GHSA-48c2-rrv3-qjmp
